<!DOCTYPE html>
<html>
<head>
  <title>AR Hewan Sulawesi Utara</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene 
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;">

    <!-- ========================= -->
    <!-- 🔴 TEST MARKER (WAJIB) -->
    <!-- ========================= -->
    <a-marker preset="hiro">
      <a-box color="red" position="0 0.5 0"></a-box>
      <a-text value="TEST BERHASIL" position="0 1 0" align="center"></a-text>
    </a-marker>

    <!-- ========================= -->
    <!-- 🐾 Tarsius -->
    <!-- ========================= -->
    <a-marker type="pattern" url="marker/tarsius.patt">
      <a-image 
        src="images/tarsius.png"
        position="0 0 0"
        scale="1.5 1.5 1.5"
        rotation="-90 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-image>
      <a-text value="Tarsius" position="0 1 0" align="center"></a-text>
    </a-marker>

    <!-- ========================= -->
    <!-- 🐾 Anoa -->
    <!-- ========================= -->
    <a-marker type="pattern" url="marker/anoa.patt">
      <a-image 
        src="images/anoa.png"
        position="0 0 0"
        scale="1.5 1.5 1.5"
        rotation="-90 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-image>
      <a-text value="Anoa" position="0 1 0" align="center"></a-text>
    </a-marker>

    <!-- ========================= -->
    <!-- 🐾 Maleo -->
    <!-- ========================= -->
    <a-marker type="pattern" url="marker/maleo.patt">
      <a-image 
        src="images/maleo.png"
        position="0 0 0"
        scale="1.5 1.5 1.5"
        rotation="-90 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
      </a-image>
      <a-text value="Maleo" position="0 1 0" align="center"></a-text>
    </a-marker>

    <!-- Kamera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
